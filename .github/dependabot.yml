version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "tsup"
          - "tsx"
          - "vitest"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
